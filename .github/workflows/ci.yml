name: CI
# A continuous integration workflow for triton-ext. This workflow builds triton-ext's dependencies in workspace
# directories: LLVM (`llvm-<hash>-<os>-<arch>`) and Triton (`triton-<hash>-<os>-<arch>`), then builds the triton-ext
# extensions.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt
      - name: Check pre-commit
        run: python3 -m pre_commit run --all-files --verbose
      - name: Print diff of changes if pre-commit failed
        if: failure()
        run: git diff

  build:
    name: Build on ${{ matrix.config.runner }}
    runs-on: ${{ matrix.config.runs_on }}
    timeout-minutes: 300
    defaults: {run: {shell: bash}}

    strategy:
      fail-fast: true
      matrix:
        config:
        - {runner: 'Ubuntu 22.04', runs_on: 'ubuntu-22.04', target-os: 'ubuntu', arch: 'x64'}
        # Eventually, this matrix can be expanded to include more platforms (see
        # `triton/.github/workflows/llvm-build.yml`):

    steps:
      - name: Checkout triton-ext
        uses: actions/checkout@v6.0.2

      - name: Collect commit hashes
        id: hashes
        # See `update-triton.yml` for where this commit hash is updated.
        run: |
          TRITON_HASH=$(cat ci/triton-hash.txt)
          echo "triton_hash=$TRITON_HASH" >> $GITHUB_OUTPUT
          echo "Triton hash: $TRITON_HASH"

          LLVM_HASH=$(python ci/fetch-llvm-hash.py $TRITON_HASH)
          echo "llvm_hash=$LLVM_HASH" >> $GITHUB_OUTPUT
          echo "LLVM hash: $LLVM_HASH"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup virtual environment
        run: |
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV

          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          echo "pip version: $(pip --version)"
          echo "python version: $(python --version)"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        # Both LLVM and Triton builds use sccache, so we set it up at the beginning of the workflow.

      - name: Build LLVM
        id: build-llvm
        uses: ./.github/actions/build-llvm
        with:
          llvm_hash: ${{ steps.hashes.outputs.llvm_hash }}

      - name: Download LLVM artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python ci/download-artifact.py ${{ steps.build-llvm.outputs.llvm_install_dir }}

      - name: Build Triton
        id: build-triton
        uses: ./.github/actions/build-triton
        with:
          triton_hash: ${{ steps.hashes.outputs.triton_hash }}
          llvm_install_dir: ${{ github.workspace }}/${{ steps.build-llvm.outputs.llvm_install_dir }}

      - name: Download Triton artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python ci/download-artifact.py ${{ steps.build-triton.outputs.triton_install_dir }}

      - name: Build Triton extensions
        run: >
          make LLVM_INSTALL_DIR="${{ steps.build-llvm.outputs.llvm_install_dir }}"
               TRITON_INSTALL_DIR="${{ steps.build-triton.outputs.triton_install_dir }}"
               EXTRA_CMAKE_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache"

      - name: Run tests
        run: >
          make test LLVM_INSTALL_DIR="${{ steps.build-llvm.outputs.llvm_install_dir }}"
                    TRITON_INSTALL_DIR="${{ steps.build-triton.outputs.triton_install_dir }}"

      - name: Test that extensions load into Triton
        env:
          PYTHONPATH: ${{ github.workspace }}/${{ steps.build-triton.outputs.triton_install_dir }}/python
          TRITON_EXT_BUILD_DIR: build
        run: |
          python -m pip install --quiet pytest
          python -c "import triton; print('triton', triton.__version__)"
          python -m pytest testing/test_plugins.py -v

      - name: List files
        run: du -d 3 -h .
